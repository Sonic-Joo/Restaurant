<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Server</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f4037, #99f2c8)
    }

    .container {
      text-align: center;
      background: white;
      padding: 60px 80px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2)
    }

    h1 {
      font-size: 38px;
      color: #333;
      margin-bottom: 15px
    }

    p {
      font-size: 18px;
      color: #666
    }

    .badge {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 22px;
      border-radius: 30px;
      background: #1f4037;
      color: white;
      font-size: 14px;
      letter-spacing: 1px
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Welcome to Our Restaurant Server</h1>
    <p>The backend service is running successfully</p>
    <div class="badge">Server Online</div>
  </div>

</body>

</html>
